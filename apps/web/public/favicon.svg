<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>KynticAI Favicon</title>
  <desc>Sovereign Rust geometric K. Optimised for browser tab icons. v1.1</desc>
  <defs>
    <filter id="rust" color-interpolation-filters="sRGB" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.15" numOctaves="5" seed="23" result="noise"/>
      <feColorMatrix type="matrix"
        values="0.926 0 0 0 0.290
                0.392 0 0 0 0.180
                0.027 0 0 0 0.098
                0 0 0 1 0"
        in="noise" result="rustTex"/>
      <feComposite in="rustTex" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- K mark -->
  <g filter="url(#rust)">
    <rect x="7" y="8" width="12" height="48" fill="#C06014"/>
    <polygon points="19,14 54,8 54,22 19,26" fill="#C06014"/>
    <polygon points="19,38 54,42 54,56 19,50" fill="#C06014"/>
  </g>
  <!-- Ring node -->
  <circle cx="24" cy="32" r="7" fill="#FDF6E3"/>
  <circle cx="24" cy="32" r="3.5" fill="#C06014" filter="url(#rust)"/>
</svg>
