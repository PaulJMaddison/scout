<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <title>KynticAI — Open Graph Image</title>
  <desc>Social link preview card. Sovereign Rust K mark. 1200x630 OG standard. v1.1</desc>

  <!-- Desert Sand base -->
  <rect width="1200" height="630" fill="#FDF6E3"/>

  <!-- Subtle paper texture + Sovereign Rust filter -->
  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.72  0 0 0 0 0.45  0 0 0 0 0.20  0 0 0 0.06 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="sovereignRust" color-interpolation-filters="sRGB" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="5" seed="23" result="noise"/>
      <feColorMatrix type="matrix"
        values="0.926 0 0 0 0.290
                0.392 0 0 0 0.180
                0.027 0 0 0 0.098
                0 0 0 1 0"
        in="noise" result="rustTex"/>
      <feComposite in="rustTex" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="1200" height="630" filter="url(#paper)"/>

  <!-- Copper rules -->
  <line x1="0" y1="60" x2="1200" y2="60" stroke="#B87333" stroke-width="2" opacity="0.4"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#B87333" stroke-width="2" opacity="0.4"/>

  <!-- K mark (170px tall in local coords) -->
  <g transform="translate(90, 220)">
    <g filter="url(#sovereignRust)">
      <rect x="0" y="0" width="43" height="170" fill="#C06014"/>
      <polygon points="43,20 167,0 167,49 43,65" fill="#C06014"/>
      <polygon points="43,105 167,121 167,170 43,150" fill="#C06014"/>
    </g>
    <circle cx="59" cy="85" r="26" fill="#FDF6E3"/>
    <circle cx="59" cy="85" r="13" fill="#C06014" filter="url(#sovereignRust)"/>
  </g>

  <!-- Wordmark -->
  <text x="340" y="335"
        font-family="'Cormorant Garamond','EB Garamond',Garamond,Georgia,serif"
        font-size="128" font-weight="500" letter-spacing="18"
        fill="#6C4675">KYNTICAI</text>

  <!-- Tagline -->
  <text x="340" y="395"
        font-family="'Cormorant Garamond',Garamond,Georgia,serif"
        font-size="32" font-style="italic" font-weight="400"
        fill="#6C4675" opacity="0.85">The governed customer data plane for enterprise AI</text>

  <!-- Anchor quote -->
  <line x1="90" y1="475" x2="180" y2="475" stroke="#B87333" stroke-width="3"/>
  <text x="90" y="525"
        font-family="'Cormorant Garamond',Garamond,Georgia,serif"
        font-size="34" font-style="italic" font-weight="400"
        fill="#3D2848">Most systems were designed to manage work, not empower.</text>

  <!-- URL bottom right -->
  <text x="1110" y="605"
        font-family="'JetBrains Mono','Consolas',monospace"
        font-size="18" font-weight="400" letter-spacing="2"
        fill="#778899" text-anchor="end">kynticai.com</text>
</svg>
