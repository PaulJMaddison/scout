<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140" fill="none">
  <title>KynticAI — Primary Logo (Dark Background)</title>
  <desc>Sovereign Rust mark + Desert Sand wordmark. For use on Charcoal or dark Amethyst backgrounds. v1.1</desc>
  <defs>
    <filter id="sovereignRust" color-interpolation-filters="sRGB" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" seed="23" result="noise"/>
      <feColorMatrix type="matrix"
        values="0.926 0 0 0 0.290
                0.392 0 0 0 0.180
                0.027 0 0 0 0.098
                0 0 0 1 0"
        in="noise" result="rustTex"/>
      <feComposite in="rustTex" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="640" height="140" fill="#1A1818"/>

  <!-- K mark — Sovereign Rust geometric block K -->
  <g filter="url(#sovereignRust)">
    <rect x="14" y="18" width="26" height="104" fill="#C06014"/>
    <polygon points="40,30 116,18 116,48 40,58" fill="#C06014"/>
    <polygon points="40,82 116,92 116,122 40,110" fill="#C06014"/>
  </g>
  <!-- Ring node: charcoal hole + rust centre dot -->
  <circle cx="50" cy="70" r="16" fill="#1A1818"/>
  <circle cx="50" cy="70" r="8" fill="#C06014" filter="url(#sovereignRust)"/>

  <!-- Wordmark -->
  <text x="148" y="92"
        font-family="'Cormorant Garamond','EB Garamond',Garamond,Georgia,'Times New Roman',serif"
        font-size="66" font-weight="500" letter-spacing="14"
        fill="#FDF6E3">KYNTICAI</text>
</svg>
